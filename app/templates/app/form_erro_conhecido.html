<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Erro Conhecido - Meu Sistema</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; }
        .topo { background: linear-gradient(135deg, #1a73e8, #1557b0); color: white; padding: 16px 32px; }
        .container { max-width: 760px; margin: 30px auto; padding: 0 20px; }
        .voltar { color: #1a73e8; text-decoration: none; display: inline-block; margin-bottom: 16px; }
        .card { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 2px 8px #0000000f; }
        h1 { margin-bottom: 24px; }.campo { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 7px; }
        input, select, textarea { width: 100%; padding: 11px 13px; border: 1px solid #ddd; border-radius: 8px; font: inherit; }
        textarea { resize: vertical; }.campo ul { list-style: none; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .campo li label { display: flex; align-items: center; gap: 9px; padding: 9px; border: 1px solid #ddd; border-radius: 8px; font-weight: 400; }
        .campo input[type="checkbox"] { width: auto; }.erro { color: #b42318; font-size: 13px; margin-top: 5px; }
        .btn { width: 100%; border: 0; border-radius: 8px; padding: 12px; background: #1a73e8; color: white; font-size: 16px; cursor: pointer; }
        @media (max-width: 600px) { .campo ul { grid-template-columns: 1fr; } }
    </style>
    <link rel="stylesheet" href="/static/app/theme.css?v=20260721-2"><script src="/static/app/theme.js"></script>
</head>
<body>
    <div class="topo"><h2>Cadastro de Erro Conhecido</h2></div>
    {% include 'app/base_nav_snippet.html' %}
    <main class="container"><a class="voltar" href="{% url 'erros_conhecidos' %}">← Voltar para Erros Conhecidos</a>
        <div class="card"><h1>Novo Erro Conhecido</h1><form method="post">{% csrf_token %}
            {% for field in form %}<div class="campo"><label for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}{% for error in field.errors %}<div class="erro">{{ error }}</div>{% endfor %}</div>{% endfor %}
            <button class="btn" type="submit">Salvar Erro Conhecido</button>
        </form></div>
    </main>
</body>
</html>
